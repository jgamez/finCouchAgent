<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expense Tracker Showdown</title>
<link rel="stylesheet" href="/static/games/shared/game-shell.css">
<style>
.expense-tracker-showdown.memory-grid {
  gap: 10px;
  margin: 12px 0;
}
.expense-tracker-showdown.perspective-wrap {
  perspective: 1100px;
}
.expense-tracker-showdown .flip-inner {
  transition: transform 0.72s cubic-bezier(0.34, 1.28, 0.64, 1);
}
.expense-tracker-showdown .ets-emoji {
  font-size: clamp(2.25rem, 11vw, 3.75rem);
  line-height: 1;
  display: block;
}
.expense-tracker-showdown .flip-back-text .ets-text {
  font-size: clamp(0.82rem, 3.4vw, 1.05rem);
  line-height: 1.35;
  display: block;
}
.expense-tracker-showdown .flip-front {
  font-size: clamp(1.4rem, 5vw, 1.85rem);
}
</style>
</head>
<body>
<h1>Expense Tracker Showdown</h1>
<p class="sub">Flip two cards — match each <strong>icon</strong> to its <strong>tracking habit</strong>. Icons are ~50% larger than our usual memory cards, with a snappier 3D flip.</p>
<div class="score" id="sc">Pairs: 0 / 4</div>
<div class="perspective-wrap expense-tracker-showdown">
  <div class="memory-grid expense-tracker-showdown" id="grid"></div>
</div>
<div class="feedback hidden" id="fb"></div>
<script>
(function(){
const pairs=[
  ["📊","Track spending by category"],
  ["🔔","Set reminders before bill due dates"],
  ["🎯","Pick a weekly spending cap to try"],
  ["🧾","Keep receipts for at least one month"]
];
let cards=[],first=null,lock=false,matches=0;
function build(){
  cards=[];
  pairs.forEach((p,i)=>{
    cards.push({id:i,kind:"emoji",t:p[0]});
    cards.push({id:i,kind:"text",t:p[1]});
  });
  cards.sort(()=>Math.random()-0.5);
  const g=document.getElementById("grid");
  g.innerHTML="";
  cards.forEach((c,idx)=>{
    const w=document.createElement("div");
    w.className="flip-wrap perspective";
    w.dataset.idx=idx;
    const back=c.kind==="emoji"
      ?'<div class="flip-face flip-back flip-back-emoji"><span class="ets-emoji">'+c.t+"</span></div>"
      :'<div class="flip-face flip-back flip-back-text"><span class="ets-text">'+c.t+"</span></div>";
    w.innerHTML='<div class="flip-inner"><div class="flip-face flip-front">?</div>'+back+"</div>";
    w.onclick=()=>flip(w);
    g.appendChild(w);
  });
}
function flip(w){
  if(lock||w.classList.contains("matched")||w.classList.contains("flipped"))return;
  w.classList.add("flipped");
  const idx=+w.dataset.idx,c=cards[idx];
  if(!first){first={w,c};return;}
  lock=true;
  const a=first.c,b=c;
  if(a.id===b.id&&a.kind!==b.kind){
    matches++;
    w.classList.add("matched");
    first.w.classList.add("matched");
    document.getElementById("sc").textContent="Pairs: "+matches+" / 4";
    if(matches===4){
      const fb=document.getElementById("fb");
      fb.classList.remove("hidden");
      fb.classList.add("good");
      fb.textContent="You matched every habit — that is how an expense tracker mindset starts.";
    }
    first=null;
    lock=false;
    return;
  }
  setTimeout(()=>{
    w.classList.remove("flipped");
    first.w.classList.remove("flipped");
    first=null;
    lock=false;
  },720);
}
build();
})();

function reportHeight() {
  const h = Math.max(
    document.body ? document.body.scrollHeight : 0,
    document.documentElement ? document.documentElement.scrollHeight : 0
  );
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'fincoach-game-height', height: h }, window.location.origin);
  }
}

window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
new MutationObserver(() => reportHeight()).observe(document.body, { childList: true, subtree: true, attributes: true });
setTimeout(reportHeight, 0);
</script>
</body>
</html>
