<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <title>{% block title %}FinCoach{% endblock %} | Goalsetter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #F5A623;
      --gold-light: #FFF3D6;
      --green: #1DB954;
      --navy: #0D1B2A;
      --slate: #4A5568;
      --cream: #FDFAF4;
      --white: #FFFFFF;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(13,27,42,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
    }

    .navbar {
      background: var(--navy);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .navbar-brand {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
      text-decoration: none;
    }

    .navbar-sub {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-weight: 300;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
    }

    .btn-primary:hover {
      background: #e8941a;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(245,166,35,0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
    }

    .btn-secondary:hover {
      background: var(--navy);
      color: var(--white);
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">FinCoach</a>
    <span class="navbar-sub">by Goalsetter</span>
  </nav>
  {% block content %}{% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
